[pytest]
# Pytest configuration for Stealth Hunter

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 6.0

# Add current directory to Python path
pythonpath = .

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Test markers for organizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    security: marks tests related to security
    rate_limiter: marks tests for rate limiter module
    discovery: marks tests for module discovery
    scope: marks tests for scope management

# Coverage options (when using pytest-cov)
# Run: pytest --cov=. --cov-report=html tests/

# Ignore patterns
norecursedirs = .git .venv venv __pycache__ .pytest_cache *.egg-info

# Log options
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (in seconds) - prevents hanging tests
# Requires pytest-timeout: pip install pytest-timeout
# timeout = 30

# Doctest options
doctest_optionflags = NORMALIZE_WHITESPACE ELLIPSIS
